services:
  auth-service:
    build: ./backend/auth-service
    ports:
      - "3002:3002"
    env_file: .env

  hospital-service:
    build: ./backend/hospital-service
    ports:
      - "3001:3001"
    env_file: .env

  queue-service:
    build: ./backend/queue-service
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  triage-service:
    build: ./backend/triage-service
    ports:
      - "3004:3004"
    env_file: .env

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
    ports:
      - "5174:5173"
    depends_on:
      - auth-service
      - hospital-service
      - queue-service
      - triage-service
