apiVersion: apps/v1
kind: Deployment
metadata:
  name: queuecure-app
  namespace: queuecure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queuecure
  template:
    metadata:
      labels:
        app: queuecure
    spec:
      containers:
      - name: instaambulance-app
        image: ghcr.io/omkarp-bit/instaambulance-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: queuecure-config
        - secretRef:
            name: queuecure-secrets
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
